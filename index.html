<!DOCTYPE html>
<html lang="fr" data-theme="auto">
    <head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://ssstuart.net/js/WWWidget.js"></script>
        <script src="https://ssstuart.net/js/IIIcons.js"></script>
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Open+Sans&family=Oswald&family=Montserrat&display=swap" rel="stylesheet">
        <link rel="icon" href="favicon.png">
		
        <title>GTA 6 Billboards</title>
        <meta name="author" content="SSStuart">
        <meta name="description" content="List of billboards in GTA 6">
        <meta property="og:title" content="GTA 6 Billboards">
        <meta property="og:site_name" content="GTA 6 Billboards">
        <meta property="og:url" content="https://gta6billboards.ssstuart.net">
        <meta property="og:description" content="List of billboards in GTA 6">
        <meta property="og:type" content="article">
        <meta property="og:image" content="https://gta6billboards.ssstuart.net/favicon.png">
        <!-- <meta name="twitter:card" content="summary_large_image"> -->
        <meta name="twitter:site" content="GTA 6 Billboards">
        <meta name="theme-color" content="#c285a6">
        
        <style>
            [data-theme="auto"] {
                color-scheme: light dark;
            }
            [data-theme="dark"] {
                color-scheme: dark;
            }
            [data-theme="light"] {
                color-scheme: light;
            }

            html {
                color-scheme: light dark;
                font-family: "Dancing Script", sans-serif;
            }
            html, body {
                margin: 0;
                min-height: 100vh;
            }
            
            header {
                padding: 1em;
                background-image: linear-gradient(#5989b1, #c285a6, #ffb16f);
                color: #FFF;
                font-size: min(1em, 4vw);
                
                #headerTitle {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    gap: 1em;

                    img {
                        height: 3em;
                    }
                }
            }
            a {
                color: #c285a6;
                position: relative;
                transition: color 500ms;

                &::after {
                    content: '';
                    position: absolute;
                    z-index: -1;
                    inset-inline: 0;
                    bottom: 0;
                    top: 100%;
                    background-image: linear-gradient(#5989b1, #c285a6, #ffb16f);
                    margin-inline: -0.3ch;
                    border-radius: 5px;

                    transition: 
                        bottom 500ms, 
                        top 500ms 100ms, 
                        background-color 500ms;
                    transition-timing-function: ease-out;
                }
                &:hover {
                    color: #FFF;
                    
                    &::after {
                        top: 0;
                        
                        transition: 
                            bottom 500ms 100ms, 
                            top 500ms, 
                            background-color 500ms;
                    }
                }
            }

            main {
                padding: 1em 2em;
            }

            #preview > p {
                font-size: min(2em, 7vw);
                text-align: center;
            }

            .billboardsCont {
                display: grid;
                grid-template-columns: repeat(auto-fill, min(100%, 20em));
                gap: 1em;
                justify-content: space-evenly;

                img {
                    width: 100%;
                }
            }

            footer {
                text-align: center;
                padding: 2em;
                background-image: linear-gradient(to top, #5989b188, #c285a688, #ffb16f88);
                color: light-dark(#000, #FFF);
            }

            #countdownCont {
                text-align: center;
                margin-block: 3em;
            }
            
            #countdown {
                font-family: "Oswald", sans-serif;
                font-size: min(7em, 10vw);
                letter-spacing: 0.05em;

                > div {
                    display: inline;
                }
                span {
                    width: 1ch;
                    display: inline-block;
                    background-image: linear-gradient(#5989b1, #c285a6, #ffb16f);
                    background-clip: text;
                    color: transparent;
                }
                .changed {
                    animation: flash 250ms ease-in;
                }
            }
            @keyframes flash {
                0% {
                    opacity: 0.7;
                }
                100% {
                    opacity: 1;
                }
            }
        </style>
	</head>

    <body>
        <header>
            <div id="headerTitle">
                <img src="./pictures/iconVI.svg" alt="logo">
                <h1>GTA 6 Billboards</h1>
            </div>
        </header>
        <main>
            <section id="countdownCont">
                <span id="countdown"></span>
            </section>
            <section id="preview">
                <p>Billboards from the <a href="https://youtu.be/QdBZY2fkU-0" target="_blank">Trailer 1</a>, <a href="https://youtu.be/VQRLujxTm3c" target="_blank">Trailer 2</a> & the <a href="https://www.rockstargames.com/VI" target="_blank">website</a>:</p>
                <div class="billboardsCont">
                    <img src="pictures/billboards/preview/billboard_trailer1.jpg" alt="Billboard from the Trailer 1 (blurry)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer2.jpg" alt="Billboard from the Trailer 1 (cropped and blurry)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer3.jpg" alt="Billboard from the Trailer 1 (blurry)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer4.jpg" alt="Billboard from the Trailer 1" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer5.jpg" alt="Billboard from the Trailer 1 (blurry)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer6.jpg" alt="Billboard from the Trailer 1 (blurry and obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer7.jpg" alt="Billboard from the Trailer 1 (blurry and obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer8.jpg" alt="Billboard from the Trailer 1 (composed of several images)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer9.jpg" alt="Billboard from the Trailer 2 (blurry and obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer10.jpg" alt="Billboard from the Trailer 2 (obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_trailer11.jpg" alt="Billboard from the Trailer 2 (blurry)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_site1.jpg" alt="Billboard from the website" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_site2.jpg" alt="Billboard from the website (obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_site3.jpg" alt="Billboard from the website (obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_site4.jpg" alt="Billboard from the website (obstructed)" loading="lazy">
                    <img src="pictures/billboards/preview/billboard_site5.jpg" alt="Billboard from the website ()" loading="lazy">
                </div>
            </section>
        </main>

        <footer>
            @ssstuart
        </footer>

        <script>
            const releaseDate = new Date(2026, 10, 19);
            let oldDays = 0;
            let oldHours = 0;
            let oldMinutes = 0;
            
            function updateCountdown() {
                const now = new Date();
                let countdown = "";
                let remainingSeconds = (releaseDate-now) / 1000;
                const remainingDays = Math.floor(remainingSeconds / (60 * 60 * 24));
                const remainingDaysString = remainingDays < 10 ? "0"+remainingDaysString : remainingDays.toString();
                if (remainingDays > 0) {
                    countdown += "<div"+(remainingDays != oldDays ? " class='changed'":"")+`><span>${remainingDaysString.split("").join('</span><span>')}</span>d</div> `;
                    oldDays = remainingDays;
                }
                remainingSeconds = remainingSeconds % (60 * 60 * 24);
                const remainingHours = Math.floor(remainingSeconds / (60 * 60));
                const remainingHoursString = remainingHours < 10 ? "0"+remainingHours : remainingHours.toString();        
                if (remainingDays > 0 || remainingHours > 0) {
                    countdown += "<div"+(remainingHours != oldHours ? " class='changed'":"")+`><span>${remainingHoursString.split("").join('</span><span>')}</span>h</div> `;
                    oldHours = remainingHours;
                }
                remainingSeconds = remainingSeconds % (60 * 60);
                const remainingMinutes = Math.floor(remainingSeconds / 60);
                const remainingMinutesString = remainingMinutes < 10 ? "0"+remainingMinutes : remainingMinutes.toString();            
                if (remainingDays > 0 || remainingHours > 0 || remainingMinutes > 0) {
                    countdown += "<div"+(remainingMinutes != oldMinutes ? " class='changed'":"")+`><span>${remainingMinutesString.split("").join('</span><span>')}</span>m</div> `;
                    oldMinutes = remainingMinutes
                }
                remainingSeconds = Math.floor(remainingSeconds % 60);
                const remainingSecondesString = remainingSeconds < 10 ? "0"+remainingSeconds : remainingSeconds.toString();            
                if (remainingDays > 0 || remainingHours > 0 || remainingMinutes > 0 || remainingSeconds > 0)
                    countdown += `<div class='changed'><span>${remainingSecondesString.split("").join('</span><span>')}</span>s</div>`;
                
                document.getElementById('countdown').innerHTML = countdown;
            }

            updateCountdown();
            setInterval(() => {
                updateCountdown();
            }, 1000);
        </script>
    </body>
</html>
